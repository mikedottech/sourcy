# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 4 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux,   Release, latest GCC   compiler toolchain on the default runner image, default generator>
      # 3. <Linux,   Release, latest Clang compiler toolchain on the default runner image, default generator>
      # 4. <macOS,   Release, AppleClang   compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Set up Java
      # The ANTLR 3.4 code generator (vendored under third_party/) is invoked at
      # configure time, so the runner needs a JRE on PATH and JAVA_HOME set.
      # GitHub-hosted runners do NOT ship a JDK on every OS image by default.
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Smoke test — compile sample CNS character
      # End-to-end check: run the freshly built `compile` against the bundled
      # tests/cns/* inputs in both Lua and C++ output modes. Catches runtime
      # regressions that pure-build CI would miss (this is how we caught the
      # ANTLR3-tree-parser optimization bug in Release builds).
      working-directory: ${{ github.workspace }}
      shell: bash
      run: |
        BUILD_DIR='${{ steps.strings.outputs.build-output-dir }}'

        # Locate the binary — single-config (Make/Ninja) drops it at $BUILD_DIR,
        # multi-config (MSBuild / VS) drops it at $BUILD_DIR/<Config>/.
        if   [ -x "$BUILD_DIR/compile" ];                          then COMPILE="$BUILD_DIR/compile"
        elif [ -x "$BUILD_DIR/${{ matrix.build_type }}/compile" ]; then COMPILE="$BUILD_DIR/${{ matrix.build_type }}/compile"
        elif [ -x "$BUILD_DIR/${{ matrix.build_type }}/compile.exe" ]; then COMPILE="$BUILD_DIR/${{ matrix.build_type }}/compile.exe"
        else
          echo "::error::compile binary not found"
          ls -la "$BUILD_DIR" "$BUILD_DIR/${{ matrix.build_type }}" 2>&1 || true
          exit 1
        fi
        echo "Using binary: $COMPILE"

        INPUTS=(./tests/cns/cloudi.cmd ./tests/cns/cloudi.cns ./tests/cns/cloudcommon.cns)

        echo "::group::compile --output LUA"
        "$COMPILE" "${INPUTS[@]}" --output LUA --entityname Cloudi
        echo "::endgroup::"

        echo "::group::compile --output CPP"
        "$COMPILE" "${INPUTS[@]}" --output CPP --entityname Cloudi
        echo "::endgroup::"
